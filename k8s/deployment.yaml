apiVersion: apps/v1
kind: Deployment
metadata:
  name: campustix-api
  namespace: campustix
  labels:
    app: campustix
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: campustix
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: campustix
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/your-org/campustix-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: campustix-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: campustix-secrets
                  key: secret-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: db-storage
              mountPath: /app/database
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: campustix-db-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: campustix-db-pvc
  namespace: campustix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---
apiVersion: v1
kind: Secret
metadata:
  name: campustix-secrets
  namespace: campustix
type: Opaque
stringData:
  secret-key: "replace-with-your-secure-secret-key"

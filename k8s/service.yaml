apiVersion: v1
kind: Service
metadata:
  name: campustix-api-service
  namespace: campustix
  labels:
    app: campustix
    component: api
spec:
  selector:
    app: campustix
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: campustix-api-nodeport
  namespace: campustix
  labels:
    app: campustix
    component: api
spec:
  selector:
    app: campustix
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500
  type: NodePort

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: campustix-ingress
  namespace: campustix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: campustix.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: campustix-api-service
                port:
                  number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: campustix-api-hpa
  namespace: campustix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: campustix-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
